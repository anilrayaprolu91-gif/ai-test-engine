name: AI Playwright Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run generated Playwright tests
        id: playwright
        run: npm run test:generated:feedback

      - name: Regenerate sync status payload for UI
        if: always()
        run: npm run sync:status:ci

      - name: Create PR for healed code
        if: failure() && steps.playwright.outcome == 'failure' && github.event_name == 'push'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "fix: auto-healed selectors via AI provider"
          title: "fix(tests): AI-healed selectors for failing Playwright run"
          body: |
            This PR contains AI-healed test updates generated after a failing Playwright run.

            - Generated by workflow: AI Playwright Test Pipeline
            - Requires human review before merge
          branch: fix/auto-healed-selectors
          delete-branch: false
