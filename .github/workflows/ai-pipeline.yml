name: AI Playwright Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run generated Playwright tests
        id: playwright
        run: npm run test:generated:feedback

      - name: Regenerate sync status payload for UI
        if: always()
        run: npm run sync:status:ci

      - name: Push healed code branch
        if: failure() && steps.playwright.outcome == 'failure' && github.event_name == 'push'
        env:
          TARGET_BRANCH: fix/auto-healed-selectors
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${TARGET_BRANCH}"
          git add -A

          if git diff --cached --quiet; then
            echo "No healed changes to push."
            exit 0
          fi

          git commit -m "fix: auto-healed selectors via AI provider"
          git push --force-with-lease origin "${TARGET_BRANCH}"

          echo "## Auto-healed branch pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "GitHub Actions cannot create pull requests in this repository because PR creation is blocked by repository policy." >> "$GITHUB_STEP_SUMMARY"
          echo "Create the PR manually using this link:" >> "$GITHUB_STEP_SUMMARY"
          echo "https://github.com/${GITHUB_REPOSITORY}/compare/main...${TARGET_BRANCH}?expand=1" >> "$GITHUB_STEP_SUMMARY"
          echo "Open PR: https://github.com/${GITHUB_REPOSITORY}/compare/main...${TARGET_BRANCH}?expand=1"
