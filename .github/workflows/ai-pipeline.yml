name: AI Playwright Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Run Playwright tests
        id: playwright
        run: PLAYWRIGHT_JSON_OUTPUT_NAME=output/playwright-report.json npx playwright test --reporter=line,json

      - name: Analyze Playwright failures
        if: failure() && steps.playwright.outcome == 'failure'
        run: |
          if [ -f output/playwright-report.json ]; then
            node scripts/analyze-playwright-report.js output/playwright-report.json output/analyze-failures.json
          else
            echo "Skipping failure analysis: output/playwright-report.json not found."
          fi

      - name: Run Healer if tests fail
        if: failure() && steps.playwright.outcome == 'failure'
        run: |
          echo "Playwright tests failed. Running Healer..."
          if [ -f output/analyze-failures.json ] && node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('output/analyze-failures.json','utf8')); const items=Array.isArray(data)?data:(data.failures||data.items||[]); const actionable=items.some(item => item && String(item.category || '').toUpperCase() === 'B' && ((item.old_selector && item.new_selector) || (item.suggested_fix && item.suggested_fix.old_selector && item.suggested_fix.new_selector))); process.exit(actionable ? 0 : 1);"; then
            node scripts/batch-heal.js output/analyze-failures.json
          else
            echo "Skipping healer: no actionable locator fixes found."
          fi

      - name: Create PR for healed code
        if: failure() && steps.playwright.outcome == 'failure' && github.event_name == 'push'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN || github.token }}
          commit-message: "fix: auto-healed selectors via AI provider"
          title: "fix(tests): AI-healed selectors for failing Playwright run"
          body: |
            This PR contains AI-healed test updates generated after a failing Playwright run.

            - Generated by workflow: AI Playwright Test Pipeline
            - Requires human review before merge
          branch: fix/auto-healed-selectors
          delete-branch: false
