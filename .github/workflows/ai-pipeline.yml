name: AI Playwright Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run generated Playwright tests
        id: playwright
        run: npm run test:generated:feedback

      - name: Regenerate sync status payload for UI
        if: always()
        run: npm run sync:status:ci

      - name: Create PR for healed code
        if: failure() && steps.playwright.outcome == 'failure' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/auto-healed-selectors
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${TARGET_BRANCH}"
          git add -A

          if git diff --cached --quiet; then
            echo "No healed changes to commit."
            exit 0
          fi

          git commit -m "fix: auto-healed selectors via AI provider"
          git fetch origin "${TARGET_BRANCH}" || true
          if ! git push --force-with-lease origin "${TARGET_BRANCH}"; then
            echo "Retrying push after refreshing remote branch state..."
            git fetch origin "${TARGET_BRANCH}" || true
            git push --force-with-lease origin "${TARGET_BRANCH}"
          fi

          if ! command -v gh >/dev/null 2>&1; then
            echo "::error::GitHub CLI (gh) is not available on this runner."
            exit 1
          fi

          cat <<'EOF' > /tmp/healed-pr-body.md
          This PR contains AI-healed test updates generated after a failing Playwright run.

          - Generated by workflow: AI Playwright Test Pipeline
          - Requires human review before merge
          EOF

          if gh pr view "${TARGET_BRANCH}" >/dev/null 2>&1; then
            gh pr edit "${TARGET_BRANCH}" --title "fix(tests): AI-healed selectors for failing Playwright run" --body-file /tmp/healed-pr-body.md
          else
            gh pr create --base main --head "${TARGET_BRANCH}" --title "fix(tests): AI-healed selectors for failing Playwright run" --body-file /tmp/healed-pr-body.md
          fi
