name: AI Playwright Test Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test

      - name: Run Healer if tests fail
        if: failure() && steps.playwright.outcome == 'failure'
        run: |
          echo "Playwright tests failed. Running Healer..."
          node scripts/healer.js

      - name: Commit and push healed code
        if: failure() && steps.playwright.outcome == 'failure'
        run: |
          git config user.name "AI Test Engine"
          git config user.email "ai-test-engine@example.com"
          git add .
          git commit -m "fix: auto-healed selectors via Gemini"
          git push
