name: Generate Playwright Tests from Specs

on:
  push:
    branches:
      - main
    paths:
      - "specs/**/*.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Regenerate spec mapping
        run: npm run sync:requirements

      - name: Generate test plans from specs
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          for file in specs/brd-*.md; do
            [ -f "$file" ] || continue
            BRD_ID=$(grep -m1 '^@brd:' "$file" | sed 's/@brd:[[:space:]]*//')
            URL=$(grep -m1 '^@url:' "$file" | sed 's/@url:[[:space:]]*//')
            GOAL=$(grep -A1 '^# Test Goal' "$file" | tail -1 | xargs)
            [ -z "$BRD_ID" ] && continue
            echo "Creating test plan for $BRD_ID..."
            node scripts/create-test-plan.js \
              --brd="$BRD_ID" \
              ${URL:+--url="$URL"} \
              ${GOAL:+--goal="$GOAL"} || echo "Plan generation failed for $BRD_ID, continuing..."
          done

      - name: Generate Playwright tests from specs
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          for file in specs/*.md; do
            node scripts/convertSpec.js "$(basename "$file")"
          done

      - name: Create PR for generated tests and plans
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN || github.token }}
          commit-message: "chore(tests): auto-generate Playwright tests and test plans from specs [skip ci]"
          title: "chore(tests): update generated Playwright tests and test plans"
          body: |
            This PR contains auto-generated Playwright test updates and test plans from the latest spec changes.

            - Generated by workflow: Generate Playwright Tests from Specs
            - Includes: test specs (`tests/*.spec.ts`) and test plans (`test-plans/*.md`)
            - Requires human review before merge
          branch: chore/auto-generated-tests
          delete-branch: false
          add-paths: |
            tests/*.spec.ts
            test-plans/*.md
