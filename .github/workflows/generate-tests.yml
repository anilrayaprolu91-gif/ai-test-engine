name: Generate Playwright Tests from Specs

on:
  pull_request:
    paths:
      - "spec/**/*.md"
      - "specs/**/*.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
      AI_MAX_RETRIES: "4"
      AI_MAX_RETRY_DELAY_MS: "60000"
      AI_CONVERT_FALLBACK_MODEL: "llama-3.1-8b-instant"
      AI_CONVERT_MAX_TOKENS: "1024"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Regenerate spec mapping
        run: npm run sync:requirements

      - name: Run generation orchestrator
        run: node scripts/generate-from-specs.js

      - name: Regenerate sync status payload for UI
        run: npm run sync:status

      - name: Commit generated files to the same PR branch
        if: ${{ github.event_name == 'pull_request' }}
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-add generated artifacts because some paths are intentionally gitignored for local workflows.
          git add -f tests/generated/ tests/pages/ output/spec-mapping.json ui/public/sync-status.json 2>/dev/null || true
          for dir in plan test-plans spec specs; do
            [ -d "$dir" ] && git add "$dir/"*.md 2>/dev/null || true
          done

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git commit -m "chore(generation): update generated plan/spec/test artifacts [skip ci]"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Push generated artifacts branch
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TARGET_BRANCH: chore/generated-spec-artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${TARGET_BRANCH}"

          git add -f tests/generated/ tests/pages/ output/spec-mapping.json ui/public/sync-status.json 2>/dev/null || true
          for dir in plan test-plans spec specs; do
            [ -d "$dir" ] && git add "$dir/"*.md 2>/dev/null || true
          done

          if git diff --cached --quiet; then
            echo "No generated file changes to push."
            exit 0
          fi

          git commit -m "chore(generation): update generated plan/spec/test artifacts [skip ci]"
          git push --force-with-lease origin "${TARGET_BRANCH}"

          echo "## Generated artifacts branch pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "GitHub Actions cannot create pull requests in this repository because PR creation is blocked by repository policy." >> "$GITHUB_STEP_SUMMARY"
          echo "Create the PR manually using this link:" >> "$GITHUB_STEP_SUMMARY"
          echo "https://github.com/${GITHUB_REPOSITORY}/compare/main...${TARGET_BRANCH}?expand=1" >> "$GITHUB_STEP_SUMMARY"
          echo "Open PR: https://github.com/${GITHUB_REPOSITORY}/compare/main...${TARGET_BRANCH}?expand=1"
