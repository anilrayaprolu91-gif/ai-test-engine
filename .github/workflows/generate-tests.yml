name: Generate Playwright Tests from Specs

on:
  push:
    branches:
      - main
    paths:
      - "specs/**/*.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Regenerate spec mapping
        run: npm run sync:requirements

      - name: Generate Playwright tests from specs
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          for file in specs/*.md; do
            node scripts/convertSpec.js "$(basename "$file")"
          done

      - name: Create PR for generated tests
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN || github.token }}
          commit-message: "chore(tests): auto-generate Playwright tests from specs [skip ci]"
          title: "chore(tests): update generated Playwright tests"
          body: |
            This PR contains auto-generated Playwright test updates from the latest specs changes.

            - Generated by workflow: Generate Playwright Tests from Specs
            - Requires human review before merge
          branch: chore/auto-generated-tests
          delete-branch: false
          add-paths: |
            tests/*.spec.ts
