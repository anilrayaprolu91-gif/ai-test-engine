name: Generate Playwright Tests from Specs

on:
  pull_request:
    paths:
      - "spec/**/*.md"
      - "specs/**/*.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
      AI_MAX_RETRIES: "4"
      AI_MAX_RETRY_DELAY_MS: "60000"
      AI_CONVERT_FALLBACK_MODEL: "llama-3.1-8b-instant"
      AI_CONVERT_MAX_TOKENS: "1024"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN || github.token }}
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Regenerate spec mapping
        run: npm run sync:requirements

      - name: Run generation orchestrator
        run: node scripts/generate-from-specs.js

      - name: Commit generated files to the same PR branch
        if: ${{ github.event_name == 'pull_request' }}
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tests/generated/*.spec.ts tests/pages/*.ts plan/*.md test-plans/*.md spec/*.md specs/*.md output/spec-mapping.json || true

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git commit -m "chore(generation): update generated plan/spec/test artifacts [skip ci]"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Create a single PR for generated artifacts
        if: ${{ github.event_name != 'pull_request' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.WORKFLOW_PUSH_TOKEN || github.token }}
          commit-message: "chore(generation): update generated plan/spec/test artifacts [skip ci]"
          title: "chore(generation): update generated plan/spec/test artifacts"
          body: |
            This PR contains generated artifacts from spec processing.

            - Plans and tests were produced by scripts/generate-from-specs.js
            - Workflow contains orchestration only; generation logic lives in JS scripts
          branch: chore/generated-spec-artifacts
          delete-branch: false
          add-paths: |
            tests/generated/*.spec.ts
            tests/pages/*.ts
            plan/*.md
            test-plans/*.md
            spec/*.md
            specs/*.md
            output/spec-mapping.json
