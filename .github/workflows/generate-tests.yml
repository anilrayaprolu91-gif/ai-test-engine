name: Generate Playwright Tests from Specs

on:
  pull_request:
    paths:
      - "spec/**/*.md"
      - "specs/**/*.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      AI_PROFILE: ${{ vars.AI_PROFILE || 'quality' }}
      AI_MAX_RETRIES: "4"
      AI_MAX_RETRY_DELAY_MS: "60000"
      AI_CONVERT_FALLBACK_MODEL: "llama-3.1-8b-instant"
      AI_CONVERT_MAX_TOKENS: "1024"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Regenerate spec mapping
        run: npm run sync:requirements

      - name: Run generation orchestrator
        run: node scripts/generate-from-specs.js

      - name: Regenerate sync status payload for UI
        run: npm run sync:status

      - name: Commit generated files to the same PR branch
        if: ${{ github.event_name == 'pull_request' }}
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-add generated artifacts because some paths are intentionally gitignored for local workflows.
          git add -f tests/generated/ tests/pages/ output/spec-mapping.json ui/public/sync-status.json 2>/dev/null || true
          for dir in plan test-plans spec specs; do
            [ -d "$dir" ] && git add "$dir/"*.md 2>/dev/null || true
          done

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git commit -m "chore(generation): update generated plan/spec/test artifacts [skip ci]"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Create a single PR for generated artifacts
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: chore/generated-spec-artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${TARGET_BRANCH}"

          git add -f tests/generated/ tests/pages/ output/spec-mapping.json ui/public/sync-status.json 2>/dev/null || true
          for dir in plan test-plans spec specs; do
            [ -d "$dir" ] && git add "$dir/"*.md 2>/dev/null || true
          done

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git commit -m "chore(generation): update generated plan/spec/test artifacts [skip ci]"
          git fetch origin "${TARGET_BRANCH}" || true
          if ! git push --force-with-lease origin "${TARGET_BRANCH}"; then
            echo "Retrying push after refreshing remote branch state..."
            git fetch origin "${TARGET_BRANCH}" || true
            git push --force-with-lease origin "${TARGET_BRANCH}"
          fi

          if ! command -v gh >/dev/null 2>&1; then
            echo "::error::GitHub CLI (gh) is not available on this runner."
            exit 1
          fi

          cat <<'EOF' > /tmp/generated-pr-body.md
          This PR contains generated artifacts from spec processing.

          - Plans and tests were produced by scripts/generate-from-specs.js
          - Workflow contains orchestration only; generation logic lives in JS scripts
          EOF

          if gh pr view "${TARGET_BRANCH}" >/dev/null 2>&1; then
            gh pr edit "${TARGET_BRANCH}" --title "chore(generation): update generated plan/spec/test artifacts" --body-file /tmp/generated-pr-body.md
          else
            gh pr create --base main --head "${TARGET_BRANCH}" --title "chore(generation): update generated plan/spec/test artifacts" --body-file /tmp/generated-pr-body.md
          fi
