name: Generate Playwright Tests from Specs

on:
  push:
    branches:
      - main
    paths:
      - 'specs/**/*.md'

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Playwright tests from specs
        run: |
          for file in specs/*.md; do
            node scripts/convertSpec.js "$(basename "$file")"
          done

      - name: Commit and push generated tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/*.spec.ts
          git commit -m "chore(tests): auto-generate Playwright tests from specs [skip ci]" || echo "No changes to commit"
          git push
